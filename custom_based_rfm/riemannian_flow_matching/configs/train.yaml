defaults:
  - _self_
  - experiment: null
  - override hydra/launcher: submitit_slurm
  - override hydra/job_logging: colorlog
  - override hydra/hydra_logging: colorlog

data: sphere_encodings  
sphere_data_path: /home/nordin/Desktop/sphere/spherical-flow-matching/custom_based_rfm/sphere_encoder/workspace/experiments/custom/encoding/processed_dataset.npz

# rna_datadir: /checkpoint/${oc.env:USER}/data/rna
# top500_datadir: /checkpoint/${oc.env:USER}/data/top500
# mesh_datadir: /checkpoint/${oc.env:USER}/data/mesh
# data_seed: null  # seed for creating the data splits. By default, uses global seed.
# #euclidean_datadir: /home/fvaleau/HAE/proj/umap_flowers/euc_embed_tv
# euclidean_datadir: /home/fvaleau/HAE/proj/animals_emb_1/euc_embed_flat
# images_datadir: /home/fvaleau/HAE/proj/animals_emb_5/embed
# #images_datadir: /home/fvaleau/HAE/proj/flowers_emb_10/embed
# images_labels: /home/fvaleau/HAE/proj/umap_flowers/labels
# images_datadir_A: /home/fvaleau/HAE/proj/selected_embeddings/100
# images_datadir_B: /home/fvaleau/HAE/proj/selected_embeddings/102


wrapped:
  dim: 5
  n_mixtures: 1
  scale: 0.2

mesh:
  numeigs: 100
  metric: biharmonic 
  temp: 0.25
  nsteps: 200  
  time_eps: 1e-5
  projx: True
  method: euler
  atol: 1e-5
  rtol: 1e-5

model:
  d_model: 512
  num_layers: 12
  actfn: swish
  fourier: null
  atol: 1e-7
  rtol: 1e-7
  metric_normalize: False

  # New settings
  dropout: 0.1
  # Conditional settings
  embed_dim: 128
  num_classes: 10
  null_chance: 0.1

optim:
  num_iterations: 20000
  batch_size: 64
  val_batch_size: 128

  scheduler: cosine
  grad_clip: 5.0
  lr: 1e-3
  wd: 0.0
  eps: 1e-8
  ema_decay: 0.99

precision: bf16-mixed

div_mode: exact
normalize_loglik: False
early_stopping_patience: 200  

use_wandb: True

resume: null

seed: 0

val_every: 10000000
ckpt_every: null
visualize: False

eval_projx: True
local_coords: False

hydra:
  job:
    chdir: True
  run:
    dir: ./outputs/runs/${data}/fm/${now:%Y.%m.%d}/${now:%H%M%S}
  sweep:
    dir: ./outputs/multiruns/${data}/fm/${now:%Y.%m.%d}/${now:%H%M%S}
    subdir: ${hydra.job.num}
  launcher:
    max_num_timeout: 100000
    timeout_min: 4319
    cpus_per_task: 10
    gpus_per_node: 1
    nodes: 1
    partition: gpu_h100
    gres: gpu:h100:1
    constraint: null
